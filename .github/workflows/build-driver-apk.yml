name: Build Driver APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/driver/**'
  pull_request:
    branches: [main]
    paths:
      - 'apps/driver/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: apps/driver/package-lock.json

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: apps/driver
        run: npm ci

      - name: Create .env file
        working-directory: apps/driver
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL || '' }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY || '' }}" >> .env

      - name: Build web app
        working-directory: apps/driver
        run: npm run build

      - name: Add Android platform
        working-directory: apps/driver
        run: npx cap add android

      - name: Generate app icons
        working-directory: apps/driver
        run: npx @capacitor/assets generate --android

      - name: Sync Capacitor
        working-directory: apps/driver
        run: npx cap sync android

      - name: Build debug APK
        working-directory: apps/driver/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bahati-driver-debug
          path: apps/driver/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
